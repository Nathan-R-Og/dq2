MEMORY {
    ZP: start = 0, size = $100, type = rw;
    RAM: start = $100, size = $800-$100, type = rw;
    SRAM: start = $6000, size = $2000, type = rw;
    HDR: start = 0, size = $10, type = ro, fill = yes;

    PRG0: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 0;
    PRG1: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 1;
    PRG2: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 2;
    PRG3: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 3;
    PRG4: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 4;
    PRG5: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 5;
    PRG6: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 6;
    PRG7: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 7;
    PRG8: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 8;
    PRG9: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = 9;
    PRGA: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $a;
    PRGB: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $b;
    PRGC: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $c;
    PRGD: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $d;
    PRGE: start = $8000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $e;
    CONSTANT: start = $C000, size = $4000, type = ro, fill = yes, fillval = $FF, bank = $f;
}

SEGMENTS {
    ZP: load = ZP, type = zp;
    RAM: load = RAM, type = bss, align = $100, define = yes;
    SRAM: load = SRAM, type = bss, align = $100, define = yes;
    HEADER: load = HDR, type = ro, align = $10;

    PRG0: load = PRG0, type = ro;
    PRG1: load = PRG1, type = ro;
    PRG2: load = PRG2, type = ro;
    PRG3: load = PRG3, type = ro;
    PRG4: load = PRG4, type = ro;
    PRG5: load = PRG5, type = ro;
    PRG6: load = PRG6, type = ro;
    PRG7: load = PRG7, type = ro;
    PRG8: load = PRG8, type = ro;
    PRG9: load = PRG9, type = ro;
    PRGA: load = PRGA, type = ro;
    PRGB: load = PRGB, type = ro;
    PRGC: load = PRGC, type = ro;
    PRGD: load = PRGD, type = ro;
    PRGE: load = PRGE, type = ro;
    CONSTANT: load = CONSTANT, type = ro;
}

FILES {
    %O: format = bin;
}